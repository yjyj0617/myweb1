<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER SOCIAL - DETAIL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Times New Roman", Times, serif; color: #111; padding-top: 65px; }
        header { position: fixed; top: 0; left: 0; width: 100%; background: #fff; border-bottom: 1px solid #000; z-index: 2000; }
        nav { position: relative; display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; height: 65px; }
        .logo-center { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-size: 20px; font-weight: bold; letter-spacing: 4px; cursor: pointer; }
        .independent-section { padding: 80px 10%; }
        
        .detail-container { display: flex; gap: 50px; }
        .detail-left, .detail-right { width: 50%; }
        .detail-img-large { height: 550px; border: 1px solid #000; background: #fafafa; }
        .detail-title { font-size: 28px; margin: 20px 0; font-weight: normal; }
        .detail-price { font-size: 22px; font-weight: bold; margin-bottom: 20px; }
        .detail-specs { display: flex; gap: 20px; margin-bottom: 15px; font-size: 13px; color:#666; }
        .detail-description { border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 15px 0; margin-bottom: 25px; }
        .wireframe-select { width: 100%; padding: 15px; border: 1px solid #000; margin-bottom: 20px; }
        
        .detail-action-buttons { display: flex; gap: 20px; }
        .detail-action-buttons button { flex: 1; padding: 15px; font-size: 14px; cursor: pointer; }
        .btn-primary { background: #000; color: #fff; }
        .btn-secondary { border: 1px solid #000; background: #fff; }
        
        
        .product-reviews { margin-top: 60px; border-top: 2px solid #000; padding-top: 40px; }
        .review-summary { display: flex; align-items: center; gap: 40px; padding: 20px 0; border-bottom: 1px solid #000; margin-bottom: 30px; }
        .big-score { font-size: 56px; }
        .star-select { display: flex; gap: 4px; margin-bottom: 12px; }
        .star-btn { font-size: 26px; cursor: pointer; color: #ccc; }
        .star-btn.selected { color: #111; }
        textarea { width: 100%; height: 90px; padding: 12px; border: 1px solid #ccc; font-family: inherit; margin-bottom: 10px; outline: none; }
        .review-item { padding: 20px 0; border-bottom: 1px solid #eee; }
        .review-img-preview img { width: 56px; height: 56px; border: 1px solid #ccc; margin-top: 5px; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 12px 28px; opacity: 0; transition: opacity 0.3s; z-index: 9999; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<header>
    <nav>
        <div class="nav-left"><a href="shop.html" style="font-size:15px;">← BACK TO SHOP</a></div>
        <div class="logo-center" onclick="location.href='index.html'">SUPER SOCIAL</div>
        <div class="nav-right"></div>
    </nav>
</header>

<section class="independent-section">
    <div class="detail-container">
        <div class="detail-left"><div class="detail-img-large"></div></div>
        <div class="detail-right">
            <span id="detailCategory" style="color:#666;">OUTER</span>
            <h2 class="detail-title" id="detailTitle">PRODUCT NAME</h2>
            <p class="detail-price" id="detailPrice">0원</p>
            <div class="detail-specs"><div><strong>소재</strong> 코튼 100%</div><div><strong>원산지</strong> 대한민국</div></div>
            <div class="detail-description" id="detailDesc">설명 문구</div>
            <select class="wireframe-select" id="detailSizeSelect">
                <option value="">사이즈 선택</option><option>S</option><option>M</option><option>L</option><option>XL</option>
            </select>
            <div class="detail-action-buttons">
                <button class="btn-secondary" onclick="addToCart(false)">장바구니 담기</button>
                <button class="btn-primary" onclick="addToCart(true)">구매하기</button>
            </div>
        </div>
    </div>

    <div class="product-reviews">
        <h3>리뷰</h3>
        <div class="review-summary">
            <div class="big-score" id="avgScore">0.0</div>
            <div>
                <div id="starsDisplay" style="font-size:20px;">☆☆☆☆☆</div>
                <p id="reviewCount">리뷰 0개</p>
            </div>
        </div>
        <div style="border: 1px solid #000; padding: 25px; margin-bottom: 30px;">
            <h4>리뷰 작성</h4>
            <div class="star-select" id="starSelect">
                <span class="star-btn" onclick="selectStar(1)">★</span><span class="star-btn" onclick="selectStar(2)">★</span><span class="star-btn" onclick="selectStar(3)">★</span><span class="star-btn" onclick="selectStar(4)">★</span><span class="star-btn" onclick="selectStar(5)">★</span>
            </div>
            <textarea placeholder="후기를 남겨주세요." id="reviewTextarea"></textarea>
            <input type="file" id="imgInput" accept="image/*" onchange="previewImg(this)">
            <div class="review-img-preview" id="imgPreview"></div>
            <button class="btn-primary" style="margin-top:10px; width:auto; padding:10px 30px;" onclick="submitReview()">등록</button>
        </div>
        <div id="reviewList"></div>
    </div>
</section>

<script>
    let product = null;
    let selectedRating = 0;
    let currentCurrency = localStorage.getItem('currency') || 'KRW';
    let globalReviews = JSON.parse(localStorage.getItem('globalReviews')) || {
        1: [{ name:'김**', stars:5, date:'2025.05.12', comment:'핏이 좋습니다.' }],
        2: [{ name:'박**', stars:4, date:'2025.04.15', comment:'원단 만족해요.' }]
    };

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
    }

    function selectStar(val) {
        selectedRating = val;
        document.querySelectorAll('.star-btn').forEach((b, i) => b.classList.toggle('selected', i < val));
    }

    function previewImg(input) {
        const p = document.getElementById('imgPreview'); p.innerHTML = '';
        if(input.files[0]) {
            const img = document.createElement('img'); img.src = URL.createObjectURL(input.files[0]);
            p.appendChild(img);
        }
    }

    function renderReviews() {
        const list = document.getElementById('reviewList');
        const rArr = globalReviews[product.id] || [];
        if(rArr.length === 0) {
            list.innerHTML = '<p style="color:#888;">등록된 리뷰가 없습니다.</p>'; return;
        }
        const avg = rArr.reduce((s,x)=>s+x.stars,0)/rArr.length;
        document.getElementById('avgScore').textContent = avg.toFixed(1);
        document.getElementById('starsDisplay').textContent = '★'.repeat(Math.round(avg)) + '☆'.repeat(5-Math.round(avg));
        document.getElementById('reviewCount').textContent = `총 ${rArr.length}개 리뷰`;

        list.innerHTML = rArr.map(r => `
            <div class="review-item">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><strong>${r.name}</strong><span>${'★'.repeat(r.stars)}</span></div>
                <p>${r.comment}</p>
            </div>
        `).join('');
    }

    function submitReview() {
        const txt = document.getElementById('reviewTextarea').value.trim();
        if(!selectedRating || !txt) { alert('별점과 내용을 채워주세요.'); return; }
        if(!globalReviews[product.id]) globalReviews[product.id] = [];
        globalReviews[product.id].unshift({ name:'고객님', stars:selectedRating, comment:txt });
        localStorage.setItem('globalReviews', JSON.stringify(globalReviews));
        document.getElementById('reviewTextarea').value = '';
        selectStar(0); renderReviews();
    }

    function addToCart(isDirect) {
        const sz = document.getElementById('detailSizeSelect').value;
        if(!sz) { showToast('사이즈를 선택해 주세요.'); return; }
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.push({ id: product.id, name: product.name, price: product.price, size: sz, qty: 1 });
        localStorage.setItem('cart', JSON.stringify(cart));
        if(isDirect) location.href = 'cart.html'; else showToast('장바구니에 담겼습니다.');
    }

    window.onload = function() {
        product = JSON.parse(localStorage.getItem('selectedProduct'));
        if(!product) { location.href = 'shop.html'; return; }
        document.getElementById('detailTitle').textContent = product.name;
        document.getElementById('detailCategory').textContent = product.category;
        document.getElementById('detailDesc').textContent = product.desc;
        document.getElementById('detailPrice').textContent = currentCurrency === 'USD' ? `$${Math.round(product.price/1000)}` : `${product.price.toLocaleString()}원`;
        renderReviews();
    }
</script>
</body>
</html>
